<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OJOL AI Asisten</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb; 
            --bg-color: #f0f4f8;
            --chat-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --user-msg-bg: #2563eb;
            --ai-msg-bg: #f1f5f9;
            --online-color: #10b981;
            --offline-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* PENYESUAIAN PERANGKAT: Menggunakan dvh agar pas dengan layar HP */
        html, body { 
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed; /* Mencegah bounce pada iOS */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .app-container { 
            width: 100%; 
            max-width: 800px; 
            height: 100dvh; /* Tinggi dinamis mengikuti layar */
            background: var(--chat-bg); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); 
            position: relative; 
        }
        
        /* HEADER */
        .header { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; background: #fff; z-index: 100; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .menu-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 4px; padding: 8px; border-radius: 8px; }
        .menu-btn span { display: block; width: 18px; height: 2px; background-color: var(--text-main); border-radius: 2px; }
        .brand h1 { font-size: 0.95rem; font-weight: 700; color: var(--primary-color); margin: 0; }
        .brand p { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* STATUS */
        .status-wrapper { display: flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: 20px; }
        .status-online { background: #ecfdf5; border: 1px solid #d1fae5; }
        .status-offline { background: #fef2f2; border: 1px solid #fee2e2; }
        .online-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-text { font-size: 0.6rem; font-weight: 700; }

        /* DROPDOWN */
        .dropdown-menu { position: absolute; top: 55px; left: 10px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: none; min-width: 220px; z-index: 200; }
        .dropdown-menu.show { display: block; }
        .menu-label { padding: 10px 15px; font-size: 0.6rem; font-weight: 700; color: var(--text-muted); background: #f8fafc; text-transform: uppercase; }
        .dropdown-item { padding: 12px 15px; font-size: 0.8rem; cursor: pointer; border: none; background: none; width: 100%; text-align: left; border-bottom: 1px solid #f8fafc; color: var(--text-main); }

        /* CHAT AREA: Dibuat fleksibel */
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #ffffff; 
            -webkit-overflow-scrolling: touch;
        }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .user-message { align-self: flex-end; background-color: var(--user-msg-bg); color: white; border-bottom-right-radius: 4px; }
        .ai-message { align-self: flex-start; background-color: var(--ai-msg-bg); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }

        /* INPUT AREA: Tetap di bawah */
        .input-container { padding: 10px; border-top: 1px solid #f1f5f9; background: white; flex-shrink: 0; }
        .input-wrapper { display: flex; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 25px; padding: 4px 6px 4px 15px; align-items: center; }
        input { flex: 1; border: none; background: transparent; padding: 10px 5px; font-size: 1rem; outline: none; }
        #send-btn { background: var(--primary-color); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .popup { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; }

        @media (min-width: 601px) {
            .app-container { height: 92vh; border-radius: 20px; border: 1px solid #e2e8f0; }
        }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="overlay" id="offline-overlay">
    <div class="popup">
        <div style="font-size: 40px; margin-bottom: 10px;">⚠️</div>
        <h3>Koneksi Terputus</h3>
        <p id="popup-desc">Sistem tidak dapat terhubung.</p>
        <button onclick="closePopup()" style="background:var(--primary-color); color:white; border:none; padding:10px 20px; border-radius:8px; margin-top:15px;">Tutup</button>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div class="header-left">
            <button class="menu-btn" onclick="event.stopPropagation(); toggleMenu();">
                <span></span><span></span><span></span>
            </button>
            <div class="brand">
                <h1>OJOL AI ASISTEN</h1>
                <p>Driver Online Kolaka</p>
            </div>
        </div>
        
        <div class="header-right">
            <div id="status-box" class="status-wrapper status-online">
                <span id="status-dot" class="online-dot"></span>
                <span id="status-text" class="status-text">Mengecek...</span>
            </div>
        </div>

        <div class="dropdown-menu" id="myDropdown">
            <button class="dropdown-item" onclick="startNewChat()" style="color:var(--primary-color); font-weight:bold;">+ Chat Baru</button>
            <div class="menu-label">Riwayat</div>
            <div id="history-container" style="max-height: 200px; overflow-y: auto;"></div>
            <div class="menu-label">Pengaturan</div>
            <button class="dropdown-item" onclick="clearAllHistory()" style="color:var(--primary-color); font-weight:bold;">Bersihkan Semua</button>
        </div>
    </div>
    
    <div id="chat-box"></div>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Tulis Pesan..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        <p style="font-size: 0.5rem; color: var(--text-muted); text-align: center; margin-top: 6px;">Powered by OJOL AI ( FARID ARIS )</p>
    </div>
</div>

<script>
    // SCRIPT TETAP SAMA SEPERTI ASLINYA (TIDAK ADA PERUBAHAN LOGIKA)
    const API_KEY = "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"; 
    const API_URL = "https://api.groq.com/openai/v1/chat/completions";
    
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');
    const statusBox = document.getElementById('status-box');
    const overlay = document.getElementById('offline-overlay');
    const popupDesc = document.getElementById('popup-desc');
    const historyContainer = document.getElementById('history-container');
    const dropdown = document.getElementById('myDropdown');

    let currentChatId = localStorage.getItem('dok_ai_current_session') || Date.now();
    let chatHistory = JSON.parse(localStorage.getItem('dok_ai_sessions')) || {};
    let isSystemOnline = true;

    window.addEventListener('click', () => dropdown.classList.remove('show'));

    function toggleMenu() { dropdown.classList.toggle('show'); }

    function showPopup(msg) { popupDesc.innerText = msg; overlay.style.display = 'flex'; }
    function closePopup() { overlay.style.display = 'none'; }

    async function updateOnlineStatus() {
        if (!navigator.onLine) { setSystemOffline("Offline"); return; }
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ messages: [{ role: "system", content: "ping" }], model: "llama-3.3-70b-versatile", max_tokens: 1 })
            });
            if (response.ok) setSystemOnline(); else setSystemOffline("Error");
        } catch (e) { setSystemOffline("Offline"); }
    }

    function setSystemOnline() {
        isSystemOnline = true;
        statusText.innerText = "Sistem Online";
        statusText.style.color = "var(--online-color)";
        statusDot.style.backgroundColor = "var(--online-color)";
        statusBox.className = "status-wrapper status-online";
    }

    function setSystemOffline(msg) {
        isSystemOnline = false;
        statusText.innerText = msg;
        statusText.style.color = "var(--offline-color)";
        statusDot.style.backgroundColor = "var(--offline-color)";
        statusBox.className = "status-wrapper status-offline";
    }

    function saveToStorage() {
        localStorage.setItem('dok_ai_sessions', JSON.stringify(chatHistory));
        localStorage.setItem('dok_ai_current_session', currentChatId);
    }

    function loadHistoryList() {
        historyContainer.innerHTML = '';
        const sessions = Object.keys(chatHistory).sort((a, b) => b - a);
        sessions.forEach(id => {
            const btn = document.createElement('button');
            btn.className = 'dropdown-item';
            btn.innerText = chatHistory[id].title || "Percakapan";
            btn.onclick = () => { currentChatId = id; renderChat(); };
            historyContainer.appendChild(btn);
        });
    }

    function renderChat() {
        chatBox.innerHTML = '';
        if (chatHistory[currentChatId]) {
            chatHistory[currentChatId].messages.forEach(msg => appendMessage(msg.role === 'user' ? 'user-message' : 'ai-message', msg.content));
        } else {
            appendMessage('ai-message', 'Halo! Saya adalah asisten AI Anda. Ada yang bisa saya bantu hari ini?');
        }
        scrollToBottom();
        loadHistoryList();
    }

    function startNewChat() {
        currentChatId = Date.now();
        renderChat();
        saveToStorage();
    }

    function clearAllHistory() {
        if (confirm("Hapus semua riwayat?")) { chatHistory = {}; localStorage.clear(); startNewChat(); }
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message || !isSystemOnline) return;
        if (!chatHistory[currentChatId]) chatHistory[currentChatId] = { title: message.substring(0, 20), messages: [] };
        
        appendMessage('user-message', message);
        chatHistory[currentChatId].messages.push({ role: 'user', content: message });
        userInput.value = "";
        
        const aiMsgDiv = appendTypingAnimation();
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ messages: chatHistory[currentChatId].messages, model: "llama-3.3-70b-versatile" })
            });
            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            aiMsgDiv.innerHTML = aiReply;
            chatHistory[currentChatId].messages.push({ role: 'assistant', content: aiReply });
            saveToStorage();
            loadHistoryList();
        } catch (e) { aiMsgDiv.innerText = "Gagal membalas."; }
        scrollToBottom();
    }

    function appendMessage(className, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv;
    }

    function appendTypingAnimation() {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ai-message`;
        msgDiv.innerHTML = `<div style="display:flex; gap:4px;"><div class="dot" style="width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:bounce 1.4s infinite ease-in-out"></div><div class="dot" style="width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:bounce 1.4s infinite ease-in-out;animation-delay:-0.16s"></div><div class="dot" style="width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:bounce 1.4s infinite ease-in-out;animation-delay:-0.32s"></div></div>`;
        chatBox.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv;
    }

    function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

    window.onload = () => { updateOnlineStatus(); renderChat(); };
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
