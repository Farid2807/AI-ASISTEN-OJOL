<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJOL AI Asisten</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* PERUBAHAN WARNA: Diubah ke Biru */
            --primary-color: #2563eb; 
            --bg-color: #f0f4f8;
            --chat-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --user-msg-bg: #2563eb;
            --ai-msg-bg: #f1f5f9;
            --online-color: #10b981;
            --offline-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .app-container { width: 100%; max-width: 800px; height: 92vh; background: var(--chat-bg); display: flex; flex-direction: column; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border-radius: 20px; overflow: hidden; margin: 10px; border: 1px solid #e2e8f0; position: relative; }
        
        /* HEADER */
        .header { padding: 12px 18px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; background: #fff; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 4px; padding: 8px; border-radius: 8px; transition: 0.2s; z-index: 101; }
        .menu-btn span { display: block; width: 18px; height: 2px; background-color: var(--text-main); border-radius: 2px; }
        .brand h1 { font-size: 1.05rem; font-weight: 700; color: var(--primary-color); margin: 0; line-height: 1.1; }
        .brand p { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* STATUS INDIKATOR */
        .status-wrapper { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; transition: 0.3s; }
        .status-online { background: #ecfdf5; border: 1px solid #d1fae5; }
        .status-offline { background: #fef2f2; border: 1px solid #fee2e2; }
        .online-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-text { font-size: 0.65rem; font-weight: 700; }

        /* POPUP ALERT */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .popup { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup h3 { color: var(--offline-color); margin-bottom: 10px; }
        .popup p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.4; }
        .popup button { background: var(--primary-color); color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* DROPDOWN MENU */
        .dropdown-menu { position: absolute; top: 60px; left: 15px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: none; min-width: 240px; z-index: 200; overflow: hidden; }
        .dropdown-menu.show { display: block; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .menu-label { padding: 10px 15px; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); background: #f8fafc; text-transform: uppercase; }
        .dropdown-item { padding: 12px 15px; font-size: 0.85rem; cursor: pointer; border: none; background: none; width: 100%; text-align: left; border-bottom: 1px solid #f8fafc; transition: 0.2s; display: block; color: var(--text-main); }
        .dropdown-item:hover { background: #f1f5f9; }

        /* CHAT AREA */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: #ffffff; scroll-behavior: smooth; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .user-message { align-self: flex-end; background-color: var(--user-msg-bg); color: white; border-bottom-right-radius: 4px; }
        .ai-message { align-self: flex-start; background-color: var(--ai-msg-bg); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }

        /* INPUT AREA */
        .input-container { padding: 15px; border-top: 1px solid #f1f5f9; background: white; }
        .input-wrapper { display: flex; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 6px 12px; }
        input { flex: 1; border: none; background: transparent; padding: 10px; font-size: 1rem; outline: none; }
        #send-btn { background: var(--primary-color); color: white; border: none; padding: 0 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }

        @keyframes pulse-green { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @media (max-width: 600px) { .app-container { height: 100vh; margin: 0; border-radius: 0; } }
    </style>
</head>
<body>

<div class="overlay" id="offline-overlay">
    <div class="popup">
        <div style="font-size: 40px; margin-bottom: 10px;">⚠️</div>
        <h3>Koneksi Terputus</h3>
        <p id="popup-desc">Sistem tidak dapat terhubung ke internet/Sistem sedang sibuk.</p>
        <button onclick="closePopup()">Tutup</button>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div class="header-left">
            <button class="menu-btn" onclick="event.stopPropagation(); toggleMenu();">
                <span></span><span></span><span></span>
            </button>
            <div class="brand">
                <h1>OJOL AI ASISTEN</h1>
                <p>Driver Online Kolaka</p>
            </div>
        </div>
        
        <div class="header-right">
            <div id="status-box" class="status-wrapper status-online">
                <span id="status-dot" class="online-dot"></span>
                <span id="status-text" class="status-text">Mengecek...</span>
            </div>
        </div>

        <div class="dropdown-menu" id="myDropdown" onclick="event.stopPropagation();">
            <button class="dropdown-item" onclick="startNewChat()" style="color:var(--primary-color); font-weight:bold;">+ Chat Baru</button>
            <div class="menu-label">Riwayat Percakapan</div>
            <div id="history-container" style="max-height: 200px; overflow-y: auto;"></div>
            <div class="menu-label">Pengaturan</div>
            <button class="dropdown-item" onclick="clearAllHistory()" style="color:var(--offline-color); font-weight:bold;">Bersihkan Semua</button>
        </div>
    </div>
    
    <div id="chat-box"></div>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Tulis Pesan..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Kirim</button>
        </div>
        <p style="font-size: 0.6rem; color: var(--text-muted); text-align: center; margin-top: 8px;">Powered by OJOL AI ( FARID ARIS )</p>
    </div>
</div>

<script>
    // Seluruh skrip tetap sama sesuai permintaan (Script dipertahankan)
    const API_KEY = "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"; 
    const API_URL = "https://api.groq.com/openai/v1/chat/completions";
    
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');
    const statusBox = document.getElementById('status-box');
    const overlay = document.getElementById('offline-overlay');
    const popupDesc = document.getElementById('popup-desc');
    const historyContainer = document.getElementById('history-container');
    const dropdown = document.getElementById('myDropdown');

    let currentChatId = localStorage.getItem('dok_ai_current_session') || Date.now();
    let chatHistory = JSON.parse(localStorage.getItem('dok_ai_sessions')) || {};
    let isSystemOnline = true;

    window.addEventListener('click', () => {
        if (dropdown.classList.contains('show')) {
            dropdown.classList.remove('show');
        }
    });

    function toggleMenu() {
        dropdown.classList.toggle('show');
    }

    function showPopup(msg) {
        popupDesc.innerText = msg;
        overlay.style.display = 'flex';
    }

    function closePopup() {
        overlay.style.display = 'none';
    }

    async function updateOnlineStatus() {
        if (!navigator.onLine) {
            setSystemOffline("Offline (No Internet)");
            showPopup("Koneksi internet Anda terputus. Silakan cek Wi-Fi atau Data Seluler Anda.");
            return;
        }

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ messages: [{ role: "system", content: "ping" }], model: "llama-3.3-70b-versatile", max_tokens: 1 })
            });

            if (response.ok) {
                setSystemOnline();
            } else {
                setSystemOffline("API Error");
                showPopup("Terjadi kesalahan pada layanan API. Silakan coba lagi nanti.");
            }
        } catch (error) {
            setSystemOffline("Sistem Offline");
            showPopup("Sistem sedang mengalami gangguan koneksi ke server.");
        }
    }

    function setSystemOnline() {
        isSystemOnline = true;
        statusText.innerText = "Sistem Online";
        statusText.style.color = "var(--online-color)";
        statusDot.style.backgroundColor = "var(--online-color)";
        statusDot.style.animation = "pulse-green 2s infinite";
        statusBox.className = "status-wrapper status-online";
    }

    function setSystemOffline(msg) {
        isSystemOnline = false;
        statusText.innerText = msg;
        statusText.style.color = "var(--offline-color)";
        statusDot.style.backgroundColor = "var(--offline-color)";
        statusDot.style.animation = "none";
        statusBox.className = "status-wrapper status-offline";
    }

    window.addEventListener('offline', () => {
        setSystemOffline("Offline");
        showPopup("Koneksi internet Anda terputus!");
    });
    window.addEventListener('online', updateOnlineStatus);

    function saveToStorage() {
        localStorage.setItem('dok_ai_sessions', JSON.stringify(chatHistory));
        localStorage.setItem('dok_ai_current_session', currentChatId);
    }

    function loadHistoryList() {
        historyContainer.innerHTML = '';
        const sessions = Object.keys(chatHistory).sort((a, b) => b - a);
        if (sessions.length === 0) {
            historyContainer.innerHTML = '<p style="padding:15px; font-size:0.75rem; color:#9ca3af; text-align:center;">Belum ada riwayat.</p>';
            return;
        }
        sessions.forEach(id => {
            const btn = document.createElement('button');
            btn.className = 'dropdown-item';
            btn.innerText = chatHistory[id].title || "Percakapan";
            btn.onclick = () => {
                currentChatId = id;
                renderChat();
                dropdown.classList.remove('show');
            };
            historyContainer.appendChild(btn);
        });
    }

    function renderChat() {
        chatBox.innerHTML = '';
        if (chatHistory[currentChatId] && chatHistory[currentChatId].messages) {
            chatHistory[currentChatId].messages.forEach(msg => {
                appendMessage(msg.role === 'user' ? 'user-message' : 'ai-message', msg.content);
            });
        } else {
            appendMessage('ai-message', 'Halo! Saya adalah asisten AI Anda. Saya baru saja diperbarui ke versi terbaru dan saat ini berfokus pada komunikasi berbasis teks. Ada yang bisa saya bantu hari ini?');
        }
        scrollToBottom();
        loadHistoryList();
    }

    function startNewChat() {
        currentChatId = Date.now();
        chatBox.innerHTML = '';
        appendMessage('ai-message', 'Halo! Saya adalah asisten AI Anda. Saya baru saja diperbarui ke versi terbaru dan saat ini berfokus pada komunikasi berbasis teks. Ada yang bisa saya bantu hari ini?');
        saveToStorage();
        loadHistoryList();
        dropdown.classList.remove('show');
    }

    function clearAllHistory() {
        if (confirm("Hapus semua riwayat percakapan secara permanen?")) {
            chatHistory = {};
            localStorage.clear();
            startNewChat();
        }
    }

    async function sendMessage() {
        if (!navigator.onLine || !isSystemOnline) {
            showPopup("Tidak dapat mengirim pesan. Anda sedang offline.");
            return;
        }

        const message = userInput.value.trim();
        if (!message) return;

        if (!chatHistory[currentChatId]) {
            chatHistory[currentChatId] = { title: message.substring(0, 25), messages: [] };
        }

        appendMessage('user-message', message);
        chatHistory[currentChatId].messages.push({ role: 'user', content: message });
        userInput.value = "";
        
        const aiMsgDiv = appendTypingAnimation();

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ messages: chatHistory[currentChatId].messages, model: "llama-3.3-70b-versatile" })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            
            aiMsgDiv.innerHTML = aiReply;
            chatHistory[currentChatId].messages.push({ role: 'assistant', content: aiReply });
            saveToStorage();
            loadHistoryList();
        } catch (error) {
            aiMsgDiv.innerText = "Koneksi gagal. Silakan coba lagi.";
            updateOnlineStatus();
        }
        scrollToBottom();
    }

    function appendMessage(className, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv;
    }

    function appendTypingAnimation() {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ai-message`;
        msgDiv.innerHTML = `<div style="display:flex; gap:4px;"><div class="dot" style="width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:bounce 1.4s infinite ease-in-out"></div><div class="dot" style="width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:bounce 1.4s infinite ease-in-out;animation-delay:-0.16s"></div><div class="dot" style="width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:bounce 1.4s infinite ease-in-out;animation-delay:-0.32s"></div></div>`;
        chatBox.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv;
    }

    function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

    window.onload = () => {
        updateOnlineStatus();
        renderChat();
    };
    
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
